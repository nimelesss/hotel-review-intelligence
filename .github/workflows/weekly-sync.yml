name: Weekly Portfolio Sync

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-portfolio-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger catalog + weekly review sync on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -e
            if [ -z "${{ secrets.SYNC_TRIGGER_TOKEN }}" ]; then
              echo "SYNC_TRIGGER_TOKEN secret is missing in GitHub."
              exit 1
            fi

            cd /srv/hotel-review-intelligence
            if [ -f package.json ]; then
              npm run catalog:refresh -- --output data/russia-hotels-catalog.json --maxTiles 220 --limit 150000 || true
            fi

            CATALOG_CODE=$(curl -sS -o /tmp/catalog-sync-response.json -w "%{http_code}" \
              -X POST "http://127.0.0.1:3100/api/catalog/sync" \
              -H "Authorization: Bearer ${{ secrets.SYNC_TRIGGER_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"limit":80000}')

            cat /tmp/catalog-sync-response.json
            if [ "$CATALOG_CODE" -lt 200 ] || [ "$CATALOG_CODE" -gt 299 ]; then
              echo "Catalog sync failed with HTTP $CATALOG_CODE"
              exit 1
            fi

            HTTP_CODE=$(curl -sS -o /tmp/weekly-sync-response.json -w "%{http_code}" \
              -X POST "http://127.0.0.1:3100/api/sync/portfolio" \
              -H "Authorization: Bearer ${{ secrets.SYNC_TRIGGER_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"mode":"weekly"}')

            cat /tmp/weekly-sync-response.json
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
              echo "Weekly sync failed with HTTP $HTTP_CODE"
              exit 1
            fi

            echo "Weekly sync trigger accepted with HTTP $HTTP_CODE"

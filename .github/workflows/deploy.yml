name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hotel-review-intelligence-vps-ops
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 18m
          script: |
            set -euo pipefail
            exec 9>/tmp/hri-deploy.lock
            flock -w 120 9
            cd /srv/hotel-review-intelligence
            git fetch origin main
            git checkout -B main origin/main

            if [ -f /etc/hotel-review-intelligence.env ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                case "$line" in
                  ""|\#*) continue ;;
                esac
                key="${line%%=*}"
                value="${line#*=}"
                export "$key=$value"
              done < /etc/hotel-review-intelligence.env
            fi

            node -e 'const vars=["DEFAULT_REALTIME_TARGETS_JSON","PORTFOLIO_SYNC_TARGETS_JSON"]; for (const n of vars){const v=process.env[n]; if(!v) continue; try{JSON.parse(v);} catch(e){console.error(`Invalid JSON in ${n}: ${e.message}`); process.exit(1);}}'

            rm -rf .next
            timeout 10m npm ci --no-audit --no-fund
            timeout 10m npm run build
            systemctl restart hotel-review-intelligence
            for i in $(seq 1 20); do
              if systemctl is-active --quiet hotel-review-intelligence; then
                echo "Service is active"
                break
              fi
              sleep 1
            done
            systemctl is-active --quiet hotel-review-intelligence
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null; then
                echo "Health-check passed"
                break
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null
            echo "Deploy completed successfully"

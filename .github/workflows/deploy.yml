name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hotel-review-intelligence-vps-ops
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 18m
          script: |
            set -eu
            cd /srv/hotel-review-intelligence
            git fetch origin main
            git checkout -B main origin/main

            rm -rf .next
            timeout 10m npm ci --no-audit --no-fund
            timeout 4m node scripts/restore-runtime-db-from-seed.mjs
            timeout 10m npm run build
            systemctl restart hotel-review-intelligence
            for i in $(seq 1 20); do
              if systemctl is-active --quiet hotel-review-intelligence; then
                echo "Service is active"
                break
              fi
              sleep 1
            done
            systemctl is-active --quiet hotel-review-intelligence
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null; then
                echo "Health-check passed"
                break
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null
            echo "Deploy completed successfully"

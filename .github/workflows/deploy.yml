name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hotel-review-intelligence
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /srv/hotel-review-intelligence
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            systemctl restart hotel-review-intelligence
            DOMAIN="hotel-review-intelligence.ru"
            WWW_DOMAIN="www.hotel-review-intelligence.ru"
            APP_IP="83.136.235.103"
            APP_PORT="3100"
            NGINX_CONF="/etc/nginx/sites-available/hotel-review-intelligence.ru.conf"
            NGINX_ENABLED="/etc/nginx/sites-enabled/hotel-review-intelligence.ru.conf"

            if ! command -v nginx >/dev/null 2>&1; then
              apt-get update
              apt-get install -y nginx
            fi
            if ! command -v certbot >/dev/null 2>&1; then
              apt-get update
              apt-get install -y certbot python3-certbot-nginx
            fi

            cat > "$NGINX_CONF" << EOF
            server {
              listen 80;
              server_name ${DOMAIN} ${WWW_DOMAIN};

              location / {
                proxy_pass http://127.0.0.1:${APP_PORT};
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }
            }
            EOF

            ln -sfn "$NGINX_CONF" "$NGINX_ENABLED"
            nginx -t
            systemctl enable nginx
            systemctl restart nginx

            DOMAIN_IPS="$(getent ahostsv4 "$DOMAIN" | awk '{print $1}' | sort -u | xargs || true)"
            WWW_IPS="$(getent ahostsv4 "$WWW_DOMAIN" | awk '{print $1}' | sort -u | xargs || true)"

            if echo "$DOMAIN_IPS $WWW_IPS" | grep -q "$APP_IP"; then
              certbot --nginx \
                -d "$DOMAIN" \
                -d "$WWW_DOMAIN" \
                --redirect \
                --agree-tos \
                --register-unsafely-without-email \
                --non-interactive || true
            else
              echo "Skip certbot: DNS not fully pointed to $APP_IP yet."
              echo "DOMAIN_IPS=$DOMAIN_IPS"
              echo "WWW_IPS=$WWW_IPS"
            fi

            for i in $(seq 1 20); do
              if systemctl is-active --quiet hotel-review-intelligence; then
                echo "Service is active"
                break
              fi
              sleep 1
            done
            systemctl is-active --quiet hotel-review-intelligence
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null; then
                echo "Health-check passed"
                break
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:3100/api/hotels >/dev/null
            echo "Deploy completed successfully"
